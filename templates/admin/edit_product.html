<head>

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
<link rel="stylesheet" href="/static/css/add_product.css">
</head>
<div class="content">
    <div class="page-header">
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:10px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Sửa sản phẩm
        </h1>
    </div>

    <div class="form-card">
        <form method="POST">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Tên sản phẩm</label>
                    <input name="name" value="{{ p.name }}">
                </div>
                <div class="form-group">
                    <label>Giá</label>
                    <input name="price" value="{{ p.price }}">
                </div>
                <div class="form-group">
                    <label>Giá cũ</label>
                    <input name="old_price" value="{{ p.old_price }}">
                </div>
                <div class="form-group">
                    <label>Tồn kho</label>
                    <input name="stock" value="{{ p.stock }}">
                </div>
                <div class="form-group">
                    <label>Danh mục</label>
                    <select name="category">
                        <option value="">-- Chọn danh mục --</option>
                        <option value="iphone"  {% if p.category == 'iphone'  %}selected{% endif %}>iPhone</option>
                        <option value="samsung" {% if p.category == 'samsung' %}selected{% endif %}>Samsung</option>
                        <option value="xiaomi"  {% if p.category == 'xiaomi'  %}selected{% endif %}>Xiaomi</option>
                        <option value="realme"  {% if p.category == 'realme'  %}selected{% endif %}>Realme</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Link ảnh</label>
                    <input name="image" value="{{ p.image }}">
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v14a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Lưu thay đổi
                </button>
                <a href="/admin/products" class="btn-cancel">Huỷ</a>
            </div>
        </form>
    </div>
</div>
