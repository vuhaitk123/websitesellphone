<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">

<div class="admin">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>
            ⭐ Admin
        </h2>

        <a href="/admin">Dashboard</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/orders">Orders</a>
        <a href="/admin/products" class="active">Products</a>
        <a href="/">Trang chủ</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- HEADER -->
        <div class="page-header">
            <h1>Quản lý sản phẩm</h1>

            <a href="/admin/products/add" class="btn-add">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Thêm sản phẩm
            </a>
        </div>

        <!-- TABLE -->
        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Kho</th>
                        <th>Ảnh</th>
                        <th>Hành động</th>
                    </tr>
                </thead>

                <tbody>
                    {% for p in products %}
                    <tr>
                        <td>#{{ p.id }}</td>

                        <!-- tên -->
                        <td>{{ p.name }}</td>

                        <!-- giá -->
                        <td>
                            {{ "{:,.0f}".format(p.price).replace(",", ".") }}đ
                        </td>

                        <!-- kho -->
                        <td>{{ p.stock }}</td>

                        <!-- ảnh -->
                        <td>
                            <img src="{{ p.image }}" width="50" style="border-radius:6px;">
                        </td>

                        <!-- action -->
                        <td>
                            <a href="/admin/products/edit/{{ p.id }}" class="btn-edit">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                Sửa
                            </a>

                            <a href="/admin/products/delete/{{ p.id }}"
                            class="btn-delete"
                            onclick="return confirm('Xóa {{ p.name }}?')">
                                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                    <path d="M10 11v6"/><path d="M14 11v6"/>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                </svg>
                                Xóa
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>
</div>
